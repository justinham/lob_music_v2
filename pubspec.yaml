name: lob_music
description: "Local music player with scanning, categorization, loop and shuffle"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  on_audio_query: ^2.9.0
  just_audio: ^0.9.42
  permission_handler: ^11.3.1
  dio: ^5.7.0
  path_provider: ^2.1.5

  cupertino_icons: ^1.0.8
  audio_service: ^0.18.18

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/gengar.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  output_location: "android/app/src/main/res"
