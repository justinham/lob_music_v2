    sdk: flutter
  on_audio_query: ^2.9.0
  just_audio: ^0.9.42
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
